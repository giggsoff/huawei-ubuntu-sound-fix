PACKAGE_NAME="snd-hda-codec-conexant-huawei"
PACKAGE_VERSION="1.0"

# Rebuild the in-tree Conexant HDA codec driver with the Huawei MateBook
# 14s/16s (SN6140) speaker/headphone routing fixup added.
BUILT_MODULE_NAME[0]="snd-hda-codec-conexant"

# Installing into updates/dkms makes depmod prefer this module over the
# stock kernel/sound/hda/codecs/snd-hda-codec-conexant.ko*.
DEST_MODULE_LOCATION[0]="/updates/dkms"

MAKE[0]="make KVER=${kernelver} KDIR=/lib/modules/${kernelver}/build"
CLEAN="make clean"

AUTOINSTALL="yes"
